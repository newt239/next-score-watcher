options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Secret Manager から .env を生成するステップ
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -euo pipefail

        : > .env

        for key in NEXT_PUBLIC_APP_VERSION NEXT_PUBLIC_APP_URL NEXT_PUBLIC_GA_ID NEXT_PUBLIC_TAG_ID NEXT_PUBLIC_SENTRY_DSN SENTRY_AUTH_TOKEN GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET TURSO_DATABASE_URL TURSO_AUTH_TOKEN BETTER_AUTH_SECRET CLOUDFLARE_KV_NAMESPACE_ID CLOUDFLARE_KV_API_TOKEN; do
          value="$(gcloud secrets versions access latest --secret="${key}" --project="${PROJECT_ID}")" || {
            echo "Error: failed to access secret ${key}" >&2
            exit 1
          }

          if [ -z "${value}" ]; then
            echo "Warning: ${key} is empty" >&2
          fi

          printf '%s=%s\n' "${key}" "${value}" >> .env
        done

  # Docker イメージをビルドするステップ
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "infra/Dockerfile.develop"
      - "-t"
      - "gcr.io/$PROJECT_ID/score-watcher-develop"
      - "."

images:
  - "gcr.io/$PROJECT_ID/score-watcher-develop"
